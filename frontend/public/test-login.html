<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 20px 0; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>CareNav Login Test</h1>
    
    <div>
        <button onclick="testPatientLogin()">Test Patient Login</button>
        <button onclick="testDoctorLogin()">Test Doctor Login</button>
    </div>
    
    <div id="result"></div>

    <script>
        const API_URL = 'https://qbjlhwzkf1.execute-api.ap-south-1.amazonaws.com/prod/api';

        async function testLogin(email, password, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<div class="result">Testing ${type} login...</div>`;

            try {
                console.log('Making request to:', `${API_URL}/auth/login`);
                console.log('With credentials:', { email, password: '***' });

                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);

                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>✓ ${type} Login Successful!</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>✗ ${type} Login Failed</h3>
                            <p>Status: ${response.status}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Login error:', error);
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>✗ ${type} Login Error</h3>
                        <p>${error.message}</p>
                        <pre>${error.stack}</pre>
                    </div>
                `;
            }
        }

        function testPatientLogin() {
            testLogin('patient@demo.com', 'patient123', 'Patient');
        }

        function testDoctorLogin() {
            testLogin('doctor@demo.com', 'doctor123', 'Doctor');
        }

        // Auto-test on load
        window.addEventListener('load', () => {
            console.log('Page loaded. API URL:', API_URL);
        });
    </script>
</body>
</html>
